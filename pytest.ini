[pytest]
# Pytest configuration for trading bot project

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests with external APIs
    slow: Slow tests
    blofin: BloFin API tests
    strategy: Strategy tests
    backtest: Backtesting tests

# Timeout for tests (seconds)
timeout = 30

# Coverage options
[coverage:run]
source = backend
          trading-bot/backend
omit =
    */tests/*
    */__pycache__/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
