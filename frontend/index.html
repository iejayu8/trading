<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">₿</span>
        <span class="logo-text">BloFin Trading Bot</span>
      </div>
      <div class="header-status">
        <span id="bot-indicator" class="indicator indicator--stopped"></span>
        <span id="bot-status-text">Stopped</span>
        <button id="btn-start" class="btn btn--success" onclick="startBot()">Start Bot</button>
        <button id="btn-stop"  class="btn btn--danger"  onclick="stopBot()" disabled>Stop Bot</button>
      </div>
    </div>
  </header>

  <main>
    <!-- ── KPI Cards ─────────────────────────────────────────────────────── -->
    <section class="cards">
      <div class="card">
        <div class="card__label">Symbol</div>
        <div class="card__value" id="kpi-symbol">BTC-USDT</div>
      </div>
      <div class="card">
        <div class="card__label">Last Price</div>
        <div class="card__value" id="kpi-price">–</div>
      </div>
      <div class="card">
        <div class="card__label">Last Signal</div>
        <div class="card__value" id="kpi-signal">–</div>
      </div>
      <div class="card">
        <div class="card__label">Equity (USDT)</div>
        <div class="card__value" id="kpi-equity">–</div>
      </div>
      <div class="card">
        <div class="card__label">Total PnL</div>
        <div class="card__value" id="kpi-pnl">–</div>
      </div>
      <div class="card">
        <div class="card__label">Win Rate</div>
        <div class="card__value" id="kpi-winrate">–</div>
      </div>
    </section>

    <!-- ── Two-column layout ─────────────────────────────────────────────── -->
    <div class="grid-2">
      <!-- Strategy Parameters -->
      <section class="panel">
        <h2 class="panel__title">Strategy Parameters</h2>
        <table class="param-table" id="param-table">
          <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- Open Positions -->
      <section class="panel">
        <h2 class="panel__title">Open Positions</h2>
        <div id="open-trades-container">
          <p class="empty-msg">No open positions</p>
        </div>
      </section>
    </div>

    <!-- ── Trade History ─────────────────────────────────────────────────── -->
    <section class="panel">
      <h2 class="panel__title">Trade History</h2>
      <div class="table-scroll">
        <table class="data-table" id="trade-table">
          <thead>
            <tr>
              <th>#</th><th>Direction</th><th>Entry</th><th>Exit</th>
              <th>Size</th><th>SL</th><th>TP</th>
              <th>PnL (USDT)</th><th>Status</th><th>Opened</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- ── Activity Log ──────────────────────────────────────────────────── -->
    <section class="panel">
      <h2 class="panel__title">Activity Log</h2>
      <div id="log-container" class="log-container"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
