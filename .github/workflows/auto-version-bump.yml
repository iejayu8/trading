name: Auto-bump version on merge to main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest

    # Skip commits that are themselves a version bump to prevent infinite loops
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the script can find the previous bump commit
          fetch-depth: 0
          # Use the built-in token (needs contents:write granted above)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version and update changelog
        id: bump
        run: python3 .github/scripts/bump_version.py

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading-bot/config.json trading-bot/CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push
